version: '3.8'

services:
  gorenel-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gorenel-server
    ports:
      - "7000:7000" # Control Port
      - "8080:8080" # Proxy Port
      - "9090:9090" # Monitoring API
    environment:
      - GO_ENV=production
      - JWT_SECRET=${JWT_SECRET:-SUPER_SECRET_KEY_CHANGE_THIS_IN_PROD}
      - REDIS_ADDR=redis:6379
      - ML_URL=http://ml-engine:5000
    depends_on:
      - redis
    networks:
      - gorenel-network

  gorenel-dashboard:
    build:
      context: ./web-dashboard
      dockerfile: Dockerfile
    container_name: gorenel-dashboard
    ports:
      - "80:80"
    depends_on:
      - gorenel-server
    networks:
      - gorenel-network

  redis:
    image: redis:7-alpine
    container_name: gorenel-redis
    ports:
      - "6379:6379"
    networks:
      - gorenel-network
    volumes:
      - redis-data:/data

networks:
  gorenel-network:
    driver: bridge

volumes:
  redis-data:
