services:
  gorenel-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gorenel-server
    restart: unless-stopped
    ports:
      - "7000:7000" # Control Port
      - "8085:8085" # Proxy Port
      - "9091:9091" # Monitoring API
    environment:
      - GO_ENV=production
      - JWT_SECRET=${JWT_SECRET:-SUPER_SECRET_KEY_CHANGE_THIS_IN_PROD}
      - DB_URL=postgres://postgres:postgres@postgres:5432/gorenel?sslmode=disable
      - REDIS_ADDR=redis:6379
      - ML_URL=http://ml-engine:5000
      - CLICKHOUSE_ADDR=clickhouse:9000
      - CLICKHOUSE_DB=gorenel
      - BASE_DOMAIN=${BASE_DOMAIN:-.gorenel.net}
      - ACME_EMAIL=${ACME_EMAIL:-admin@gorenel.net}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      ml-engine:
        condition: service_started
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9091/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - gorenel-network

  gorenel-dashboard:
    build:
      context: ./web-dashboard
      dockerfile: Dockerfile
    container_name: gorenel-dashboard
    restart: unless-stopped
    ports:
      - "4000:80"
    depends_on:
      gorenel-server:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - gorenel-network

  ml-engine:
    build:
      context: ./services/ml
      dockerfile: Dockerfile
    container_name: gorenel-ml-engine
    restart: unless-stopped
    networks:
      - gorenel-network

  redis:
    image: redis:7-alpine
    container_name: gorenel-redis
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gorenel-network
    volumes:
      - redis-data:/data

  postgres:
    image: postgres:15-alpine
    container_name: gorenel-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=gorenel
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gorenel-network
    volumes:
      - postgres-data:/var/lib/postgresql/data

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: gorenel-clickhouse
    restart: unless-stopped
    environment:
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
      - CLICKHOUSE_DB=gorenel
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping" ]
      interval: 30s
      timeout: 10s
      retries: 10
    networks:
      - gorenel-network
    volumes:
      - clickhouse-data:/var/lib/clickhouse

networks:
  gorenel-network:
    driver: bridge

volumes:
  redis-data:
  postgres-data:
  clickhouse-data:
