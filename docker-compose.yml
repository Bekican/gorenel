services:
  gorenel-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "0.0.0.0:7005:7000" # Control Port (Fly.io routes external:7000 to internal:7005)
      # 8085 (Proxy) and 9091 (Monitoring) are accessed via Docker network or internal routing
    environment:
      - GO_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - DB_URL=postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/gorenel?sslmode=disable
      - REDIS_ADDR=redis:6379
      - ML_URL=http://ml-engine:5000
      - CLICKHOUSE_ADDR=clickhouse:9000
      - CLICKHOUSE_DB=gorenel
      - BASE_DOMAIN=${BASE_DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URL=${GOOGLE_REDIRECT_URL}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GITHUB_REDIRECT_URL=${GITHUB_REDIRECT_URL}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - gorenel-net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # For DinD interaction if needed
      - ./logs:/app/logs
    restart: unless-stopped

  gorenel-dashboard:
    build:
      context: ./web-dashboard
      dockerfile: Dockerfile
    ports:
      - "${DASHBOARD_PORT:-4000}:80"
    environment:
      - API_URL=https://${BASE_DOMAIN}/api
    depends_on:
      - gorenel-server
    networks:
      - gorenel-net
    volumes:
      - ./web-dashboard/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  ml-engine:
    build:
      context: ./services/ml
      dockerfile: Dockerfile
    # Internal only
    networks:
      - gorenel-net
    restart: unless-stopped

  redis:
    image: public.ecr.aws/docker/library/redis:7-alpine
    # Internal only
    networks:
      - gorenel-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: public.ecr.aws/docker/library/postgres:15-alpine
    # Internal only
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=gorenel
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gorenel-net

  clickhouse:
    image: clickhouse/clickhouse-server:23.8-alpine
    # Internal only
    environment:
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - gorenel-net
    restart: unless-stopped

networks:
  gorenel-net:
    driver: bridge

volumes:
  postgres_data:
  clickhouse_data:
