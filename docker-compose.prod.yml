services:
  caddy:
    image: ${DOCKER_USER:-bekican}/gorenel-caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      gorenel-server:
        condition: service_healthy
      gorenel-dashboard:
        condition: service_healthy
    networks:
      - gorenel-net

  gorenel-server:
    image: ${DOCKER_USER:-bekican}/gorenel-server:latest
    env_file:
      - .env
    ports:
      - "7000:7000"
    environment:
      - GO_ENV=production
      - DB_URL=postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/gorenel?sslmode=disable
      - REDIS_ADDR=redis:6379
      - ML_URL=http://ml-engine:5000
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      ml-engine:
        condition: service_healthy
    networks:
      - gorenel-net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - gorenel_logs:/home/appuser/logs
      - ./bin:/home/appuser/bin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  gorenel-dashboard:
    image: ${DOCKER_USER:-bekican}/gorenel-dashboard:latest
    ports:
      - "${DASHBOARD_PORT:-4000}:80"
    depends_on:
      gorenel-server:
        condition: service_healthy
    networks:
      - gorenel-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ml-engine:
    image: ${DOCKER_USER:-bekican}/gorenel-ml-engine:latest
    environment:
      - ML_WARMUP_DELAY_SEC=3
      - ML_WARMUP_SAMPLES=280
      - ML_WARMUP_AE_EPOCHS=6
    volumes:
      - ml_trained_models:/app/trained_models
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - gorenel-net
    restart: unless-stopped

  redis:
    image: public.ecr.aws/docker/library/redis:7-alpine
    networks:
      - gorenel-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
    restart: unless-stopped

  postgres:
    image: public.ecr.aws/docker/library/postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=gorenel
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gorenel-net
    restart: unless-stopped

networks:
  gorenel-net:
    driver: bridge

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  gorenel_logs:
  ml_trained_models:
