map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 4002;
  server_name _;

  # We intentionally serve a friendly "starting" page for users when the upstream
  # dashboard isn't ready, BUT health checks must reflect the real status so Fly
  # can restart/replace unhealthy machines.
  proxy_intercept_errors on;
  error_page 502 503 504 =200 /starting.html;

  location = /starting.html {
    root /usr/share/nginx/html;
    add_header Content-Type text/html;
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
  }

  # Health endpoint: returns 200 only when the upstream dashboard is reachable.
  # Fly checks should hit this path, not `/`.
  location = /healthz {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    proxy_connect_timeout 1s;
    proxy_read_timeout 3s;
    proxy_send_timeout 3s;

    # If upstream is down, DO NOT mask it as 200.
    error_page 502 503 504 =503;
    proxy_pass http://127.0.0.1:4003/;
  }

  location / {
    proxy_http_version 1.1;
    # Required for WebSocket (CLI wss://…/tunnel/connect) through this hop to dashboard nginx.
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    proxy_connect_timeout 1s;
    # Tunnels and upgrades need more than the default short window.
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    proxy_pass http://127.0.0.1:4003;
  }
}

