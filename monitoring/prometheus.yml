global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'gorenel-production'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - 'alertmanager:9093'

# Load rules once and periodically evaluate them
rule_files:
  - 'alerts.yml'

scrape_configs:
  # Gorenel Server
  - job_name: 'gorenel'
    static_configs:
      - targets: ['gorenel-server:9090']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter (if available)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  # ClickHouse
  - job_name: 'clickhouse'
    static_configs:
      - targets: ['clickhouse:9363']

  # Redis
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']