# Default values for gorenel
# This is a YAML-formatted file.

global:
  imageRegistry: public.ecr.aws

# Gorenel Server Configuration
server:
  replicaCount: 1  # Reduced for local dev
  
  image:
    repository: bekican/gorenel-server
    tag: latest
    pullPolicy: IfNotPresent
  
  service:
    type: LoadBalancer
    controlPort: 7000
    httpPort: 80
    httpsPort: 443
    monitoringPort: 9090
    annotations: {}
  
  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 1Gi
  
  autoscaling:
    enabled: false
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  
  # Node affinity
  nodeSelector: {}
  tolerations: []
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - gorenel
            topologyKey: kubernetes.io/hostname

# Configuration
config:
  baseDomain: "tunnel.example.com"
  logLevel: "info"
  retentionDays: 30
  batchSize: 1000
  flushInterval: "5m"

# TLS/SSL Configuration
tls:
  enabled: false
  secretName: gorenel-tls
  certManager:
    enabled: false
    issuer: letsencrypt-prod
    email: bekircan3634@gmail.com

# Persistence (for logs and archives)
persistence:
  enabled: true
  storageClass: "hostpath"
  accessMode: ReadWriteOnce
  size: 100Gi
  annotations: {}

# Monitoring
monitoring:
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
      interval: 30s
  
  grafana:
    enabled: true
    adminPassword: "admin"
    dashboards:
      enabled: true

# Database (ClickHouse for analytics)
clickhouse:
  enabled: true
  replicaCount: 1
  persistence:
    enabled: true
    size: 20Gi
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi

# Redis (for session storage)
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: true
    password: "changeme"
  master:
    persistence:
      enabled: true
      size: 10Gi

# ML Service Configuration
ml:
  enabled: true
  replicaCount: 2
  image:
    repository: bekican/gorenel-ml
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 5000
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 200m
      memory: 512Mi

# Dashboard Configuration (Nginx)
dashboard:
  enabled: true
  replicaCount: 1
  image:
    repository: bekican/gorenel-dashboard
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

# Ingress Configuration
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: dashboard.tunnel.example.com
      paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: dashboard
              port: 80
    - host: "*.tunnel.example.com"
      paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: server
              port: 8080

# Security
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

podSecurityContext:
  fsGroup: 1000

# Network Policies
networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: gorenel
      ports:
        - protocol: TCP
          port: 7000
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 53  # DNS
        - protocol: UDP
          port: 53

# Service Account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# RBAC
rbac:
  create: true