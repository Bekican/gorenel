map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name gorenel.site www.gorenel.site localhost;

    # WWW to Apex Redirect
    if ($host = "www.gorenel.site") {
        return 301 $scheme://gorenel.site$request_uri;
    }
    
    # Long cache for hashed static assets.
    location ~* ^/assets/.*\.(js|css|png|jpg|jpeg|gif|svg|webp|ico|woff2?)$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Cache for static root assets that change rarely.
    location ~* ^/(logo\.png|og-cover\.jpg|robots\.txt|sitemap\.xml)$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        add_header Cache-Control "public, max-age=60";
        try_files $uri $uri/ /index.html;
    }

    location ~ ^/(api|health|metrics|info|analytics|ws|tunnel|v1|install\.sh|install\.ps1|downloads) {
        proxy_pass http://gorenel-server:9091;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Wildcard Tunnel Proxy for subdomains (*.gorenel.site)
server {
    listen 80;
    server_name *.gorenel.site;

    # Ensure management/API endpoints always hit monitoring server,
    # even when requests are made from a tunnel subdomain origin.
    location ~ ^/(api|health|metrics|info|analytics|ws|tunnel|v1|install\.sh|install\.ps1|downloads) {
        proxy_pass http://gorenel-server:9091;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://gorenel-server:8085;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Increase timeouts for long-lived tunnel connections
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
